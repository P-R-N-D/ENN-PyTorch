[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "stnet-pytorch"
version = "0.1.0"
description = "PyTorch implementation of STNet with distributed training and inference workflows"
readme = { file = "README.md", content-type = "text/markdown" }
requires-python = ">=3.10"
license = "PolyForm-Noncommercial-1.0.0"
license-files = ["LICENSE*"]
authors = [{ name = "Kim Jeseok" }]
keywords = ["transformer", "spatio-temporal", "pytorch", "fp8", "training"]
dependencies = [
  "torch>=2.9.0",
  "torchdata>=0.11.0",
  "tensordict>=0.10.0",
  "torchrl>=0.10.0",
  "triton>=3.5.0".
  "numpy>=2.3.4",
  "netifaces>=0.11.0",
  "tqdm>=4.67.1"
]

[project.optional-dependencies]
pandas = ["pandas>=2.3.3"]
polars = ["polars>=1.35.1"]
excel = ["openpyxl>=3.1.5", "fastexcel>=0.16.0"]
spark = ["pyspark[pandas_on_spark]>=4.0.1"]
optimization = ["torchao>=0.14.1", "psutil>=7.1.2"]
nvidia_gds_cu12 = ["cupy-cuda12x>=13.6.0", "kvikio-cu12>=25.10.0"]
nvidia_gds_cu13 = ["cupy-cuda13x>=13.6.0", "kvikio-cu13>=25.10.0"]
nvidia_te_cu12 = ["transformer-engine-cu12>=2.8.0", "transformer-engine-torch>=2.8.0"]
nvidia_te_cu13 = ["transformer-engine-cu13>=0.0.0a0", "transformer-engine-torch>=2.8.0"]
intel_ai = ["intel-extension-for-pytorch>=2.8.0"]
service = [
  "onnx>=1.19.1",
  "onnx-tf>=1.10.0",
  "onnx2tf>=1.28.3",
  "coremltools>=8.3.0",
  "tensorrt>=10.13.3.9",
  "executorch>=1.0.0"
]
torchscale = ["torchscale>=0.3.0"]

[tool.setuptools]
include-package-data = true

[tool.setuptools.packages.find]
include = ["stnet*"]

[tool.setuptools.package-data]
"stnet" = [
  "**/*.json",
  "**/*.yaml",
  "**/*.yml",
  "**/*.ini",
  "**/*.cfg",
  "**/*.md",
  "**/*.txt",
  "**/*.pt",
  "**/*.pth",
  "**/*.onnx",
  "**/*.bin"
]
