[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "stnet-pytorch"
version = "0.1.0"
description = "PyTorch implementation of STNet with distributed training and inference workflows"
readme = { file = "README.md", content-type = "text/markdown" }
requires-python = ">=3.10"
license = "PolyForm-Noncommercial-1.0.0"
license-files = ["LICENSE*"]
authors = [{ name = "Kim Jeseok" }]
keywords = ["transformer", "spatio-temporal", "pytorch", "fp8", "training"]
dependencies = [
  "torch>=2.1",
  "torchvision>=0.16",
  "torchdata>=0.11",
  "tensordict>=0.10.0",
  "numpy>=1.24",
  "netifaces>=0.11",
  "pyarrow[flight]>=10",
  "tqdm>=4.66"
]

[project.optional-dependencies]
queue = ["pyzmq>=25"]
ao = ["torchao>=0.5"]
gds = ["cupy>=12.1", "kvikio>=23.8"]
te = ["transformer-engine[pytorch]>=2.0"]
intel = ["intel-extension-for-pytorch>=2.3"]
ucx = ["ucxx-cu12>=0.45.0"]
arrow_cuda = ["pyarrow[cuda]>=10"]
export = [
  "onnx>=1.14",
  "onnx-tf>=1.10.0",
  "onnx2tf>=1.18.0",
  "coremltools>=6.3",
  "tensorrt>=10.0",
  "executorch>=0.4"
]
scale = ["torchscale>=0.3.0"]

[tool.setuptools]
include-package-data = true

[tool.setuptools.packages.find]
include = ["stnet*"]

[tool.setuptools.package-data]
"stnet" = [
  "**/*.json",
  "**/*.yaml",
  "**/*.yml",
  "**/*.ini",
  "**/*.cfg",
  "**/*.md",
  "**/*.txt",
  "**/*.pt",
  "**/*.pth",
  "**/*.onnx",
  "**/*.bin"
]
