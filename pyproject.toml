[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "stnet-pytorch"
version = "0.1.1"
description = "PyTorch implementation of STNet with distributed training and inference workflows"
readme = { file = "README.md", content-type = "text/markdown" }
requires-python = ">=3.10"
license = "PolyForm-Noncommercial-1.0.0"
license-files = ["LICENSE*"]
authors = [{ name = "Kim Jeseok" }]
keywords = ["transformer", "spatio-temporal", "pytorch", "fp8", "training"]
dependencies = [
  "torch>=2.7.0",
  "torchdata>=0.11.0",
  "tensordict>=0.10.0",
  "torchrl>=0.8.1",
  "triton>=3.2.0",
  "numpy>=2.2.5",
  "scipy>=1.14.1",
  "netifaces>=0.11.0",
  "py-cpuinfo>=9.0.0",
  "psutil>=7.0.0",
  "tqdm>=4.67.1"
]

[project.optional-dependencies]
pandas = ["pandas>=2.2.0"]
polars = ["polars>=1.30.0"]
excel = ["openpyxl>=3.1.5", "fastexcel>=0.14.0"]
spark = ["pyspark[pandas_on_spark]>=4.0.0"]
thread = ["psutil>=7.0.0"]
torchao = ["torchao>=0.11.0"]
nvidia_gds_cu12 = ["cupy-cuda12x>=13.6.0", "kvikio-cu12>=25.12.0"]
nvidia_gds_cu13 = ["cupy-cuda13x>=13.6.0", "kvikio-cu13>=25.12.0"]
nvidia_te_cu12 = ["transformer-engine-cu12>=2.2.0", "transformer-engine-torch>=2.2.0"]
nvidia_te_cu13 = ["transformer-engine-cu13>=2.9.0", "transformer-engine-torch>=2.2.0"]
intel_ai = ["intel-extension-for-pytorch>=2.7.0"]
service = [
  "onnx>=1.18.0",
  "onnx-tf>=1.10.0",
  "onnx2tf>=1.27.2",
  "coremltools>=8.3.0",
  "tensorrt>=10.10.0.31",
  "executorch>=0.6.0"
]
torchscale = ["torchscale>=0.3.0"]
telemetry = ["pynvml>=11.5.0"]

[tool.setuptools]
include-package-data = true

[tool.setuptools.packages.find]
include = ["stnet*"]

[tool.setuptools.package-data]
"stnet" = [
  "**/*.json",
  "**/*.yaml",
  "**/*.yml",
  "**/*.ini",
  "**/*.cfg",
  "**/*.md",
  "**/*.txt",
  "**/*.pt",
  "**/*.pth",
  "**/*.onnx",
  "**/*.bin"
]
